_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_preserve_symlinks: true
# The stack overlays into the project root (ANGEE_ROOT=.), but the PROJECT owns the
# canonical .copier-answers.yml (rendered by the chained projects/web). The stack
# keeps its OWN answers file so it never clobbers the project's.
_answers_file: .copier-answers.stack.yml

_message_after_copy: |
  Local Angee instance rendered — the root folder IS the stack and a git-controlled
  project (ANGEE_ROOT=.). Operator + Postgres + Redis + Django + Caddy-served SPA.

  Framework mode: "{{ framework }}".
  - source (default): the django service runs the deps-only base image
    (ghcr.io/ang-ee/django-angee-base) and links the framework editable from a local
    checkout at container start. Clone it at the stack root FIRST:
      git clone https://github.com/ang-ee/angee-django sources/angee-django
  - baked: set framework=baked and django_image=ghcr.io/ang-ee/django-angee:latest to
    run a code-baked runtime image (no source checkout, no per-start uv sync).

  1. Bring it up (operator + Postgres + Redis + Django + Caddy). The django container's
     `manage.py angee provision` owns first start: it waits for Postgres, emits runtime/,
     creates migrations, migrates, syncs permissions, loads resources, writes GraphQL
     schemas, and bootstraps the admin user. Then Caddy serves the built SPA:
       angee dev
  2. Point an external CLI shell at the tokenized local operator (run from this root;
     `angee secret reveal` reads the stack's secrets backend, so no hand-parsing of
     .env — its values are quoted):
       export ANGEE_OPERATOR_URL=http://127.0.0.1:{{ operator_port }}
       export ANGEE_OPERATOR_TOKEN="$(angee secret reveal operator-token)"

  App:      http://localhost:{{ ui_port }}
  Login:    admin / the generated admin-password secret in .env

  The framework's notes example is NOT installed by default (INSTALLED_APPS is
  base-only). Add it later by declaring a git source onto angee-django/examples
  and enabling example.notes in settings.yaml's INSTALLED_APPS.

_angee:
  schema: 1
  kind: stack
  name: local
  description: >-
    A self-contained local Angee instance: the root folder IS the stack AND a
    git-controlled project (ANGEE_ROOT=.). It chains the `projects/web` project
    template to scaffold the host (manage.py, settings.yaml, addons, web), then
    overlays a Postgres-backed `angee.yaml` — operator + postgres (pgvector) +
    redis + django (DATABASE_URL → postgres) + Caddy serving the built SPA. By
    default (`framework=source`) the django service runs the deps-only base image
    and links the framework editable from a local `sources/angee-django` checkout
    at container start; `framework=baked` runs a code-baked runtime image instead.
    This is how you run your own Angee app locally on a real Postgres database.
  # Chain the project template first so the stack overlays a real host, then this
  # template adds only the stack overlay (angee.yaml, .gitignore). The ref is
  # relative to THIS template's directory (the operator's chain resolver joins it
  # against the stack template dir); downstream this can instead pin a remote ref,
  # e.g. github.com/ang-ee/angee-django//templates/projects/web?ref=<tag>.
  chain:
    - template: ../../projects/web
      inputs:
        project_name: "${inputs.instance_name}"
        web_path: "${inputs.web_path}"
        addon_namespace: "${inputs.addon_namespace}"
        addon_installer_backend: operator
        include_operator_installer: true
        # The rendered pyproject resolves django-angee editable from the same
        # checkout the framework=source stack runs, so `uv run manage.py` works
        # bare from the instance root.
        framework_source_path: sources/angee-django

# Machine name of the instance: the compose project's friendly label (the operator
# derives a root-unique project id from it) AND the chained project's name (seeds
# SECRET_KEY, manage.py docstring, the web package's npm scope).
instance_name:
  type: str
  default: angee-local
  help: Machine name of the instance; also the chained project's name.

# Directory + import namespace for this project's own consumer addons (addons/<ns>/,
# referenced in INSTALLED_APPS as <ns>.<app>). Must be a valid Python identifier.
# Copier-go does not evaluate Jinja defaults before chain-input substitution, so
# keep this concrete; override it alongside `instance_name` for custom projects.
addon_namespace:
  type: str
  default: angee_local
  help: Import namespace for this project's consumer addons; a valid Python identifier.

# Path of the web package relative to the project root; matches the chained project's
# web_path and the frontend-build/caddy services' project-relative web path.
web_path:
  type: str
  default: "web"
  help: Path of the web package relative to the project root.

# How the django service obtains the framework code. `source` (default) runs the
# deps-only base image and links the framework editable from a `sources/angee-django`
# checkout at container start (`uv sync --project sources/angee-django`) — the checkout
# must exist at the stack root, so clone it there. `baked` runs a code-baked runtime
# image with the framework already installed (no source checkout, no per-start uv sync);
# set django_image=ghcr.io/ang-ee/django-angee:latest yourself when choosing baked.
framework:
  type: str
  default: source
  choices:
    - source
    - baked
  help: How the django service obtains framework code. source = deps-only base image + editable link from sources/angee-django; baked = code-baked runtime image (also set django_image to the runtime image).

# The image the django/celery services run. Default is the deps-only base image
# (deps + uv + git, framework code NOT baked): `framework=source` links the framework
# editable into the baked /opt/.venv from sources/angee-django at start. For
# `framework=baked`, set this to the code-baked runtime image ghcr.io/ang-ee/django-angee:latest.
django_image:
  type: str
  default: "ghcr.io/ang-ee/django-angee-base:latest"
  help: Image the django/celery services run. Default = deps-only base image (for framework=source). For framework=baked, set to ghcr.io/ang-ee/django-angee:latest.

web_image:
  type: str
  default: "ghcr.io/ang-ee/angee-web:latest"
  help: Framework JS runtime image (node + the @angee/* pnpm workspace) the frontend build service runs.

caddy_image:
  type: str
  default: "caddy:2.9-alpine"
  help: Caddy image serving the built SPA and proxying backend paths over the Docker network.

operator_port:
  type: int
  default: 9000
django_port:
  type: int
  default: 8000
ui_port:
  type: int
  default: 5173
