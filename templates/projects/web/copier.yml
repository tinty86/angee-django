_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
# The project owns the repo root, so it takes the canonical answers file. The dev
# stack is NOT rendered here — it is an on-demand overlay a developer adds with
# `angee init --dev` (into a gitignored `.angee/`), and a non-dev `stacks/local`
# instance clones this project in as a source. Either way the root is the project.
_answers_file: .copier-answers.yml

_angee:
  schema: 1
  kind: project
  name: web
  description: >-
    Full host scaffold for a downstream Angee project: manage.py, pyproject.toml
    (uv owns framework resolution, so `uv run manage.py` works bare from the
    root), settings.yaml, the consumer-addon namespace, and the Vite + React web
    package. The composed runtime graph owns frontend package discovery, Tailwind
    source scanning, app addon/schema wiring, and typed GraphQL operation codegen
    through `runtime/web/*` artifacts emitted by `manage.py angee build`.

# Machine name of the project — the slug used for the SECRET_KEY, the manage.py
# docstring, and (by default) the web package's npm scope. Lowercase, no spaces.
project_name:
  type: str
  default: app
  help: Machine name of the project (lowercase slug); seeds SECRET_KEY and the web package scope.

# Display title for the rendered SPA (index.html <title>).
project_title:
  type: str
  default: Angee
  help: Human title shown in the browser tab (index.html <title>).

# npm package name for the rendered web package. Scoped to the project so it does
# not collide with framework workspace packages; defaults to the project name.
package_name:
  type: str
  default: "@{{ project_name }}/web"
  help: npm name for the rendered web package (its own private host package).

# Directory name for the project's own consumer addons, under addons/<namespace>/.
# INSTALLED_APPS references it as `<namespace>.<app>`.
addon_namespace:
  type: str
  default: "{{ project_name }}"
  help: Directory + import namespace for this project's consumer addons (addons/<namespace>/).

# Path to the project's web package, relative to the project root — the directory
# this template renders the web package into. Mirrors the `web_path` input the dev
# stack passes to `pnpm --dir <web_path> codegen`, so codegen ownership is one place.
web_path:
  type: str
  default: "web"
  help: Path of the web package relative to the project root (matches the dev stack's web_path).

# Backend used by the platform addon installer. Plain projects default to direct
# local file edits; containerized stacks can opt into an operator-backed writer so
# project source mutations happen on the host side of the bind mount.
addon_installer_backend:
  type: str
  default: local
  choices:
    - local
    - operator
  help: Addon installer backend for platform install/uninstall flows.

# Whether the rendered host should include the operator installer bridge addon.
# Kept separate from the backend name so a stack explicitly owns both the setting
# and the addon dependency it requires.
include_operator_installer:
  type: bool
  default: false
  help: Include angee.platform_integrate_operator in INSTALLED_APPS.

# The rendered web package reaches the framework's build-config (Vite, Vitest) by
# PACKAGE NAME — `@angee/app/vite`, `@angee/app/vitest` — not a sibling path.
# `@angee/app` is a dependency of the web package, so those exports resolve the
# same way whether the framework is an editable checkout or an installed wheel.
# That is why this template takes no `framework_*` path input. (The tsconfig is
# inlined rather than extended: a package-name `extends` resolves in tsc but not
# in Vite's oxc tsconfig loader.)

# React major used for the @types/react* devDependencies. Kept as one input so the
# rendered manifest pins a single React line.
react_version:
  type: str
  default: "^19.2.0"
  help: React (and react-dom) version range for the rendered package.

# Where the rendered pyproject.toml resolves django-angee from. Empty (default)
# emits a plain PyPI dependency; a path (relative to the project root) emits a
# `[tool.uv.sources]` editable override onto a local framework checkout — the
# `stacks/local` chain passes `sources/angee-django` so host-run `uv run manage.py`
# and the framework=source stack share one code source. For a framework=baked
# instance without a checkout, blank this or keep the checkout cloned.
framework_source_path:
  type: str
  default: ""
  help: Path (relative to the project root) of a local framework checkout for the pyproject `[tool.uv.sources]` editable override; empty = plain PyPI dependency.
