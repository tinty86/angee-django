# The integration the local-template VCS capability runs over. `config.local_root` is
# resolved against BASE_DIR by LocalVCSBackend — "../.." is the repo root, where
# templates/ lives. `credential_env` names the API-key env var rendered agent services
# consume (the agent's own model provider supplies the real per-agent value).
- xref: integration_local_templates
  owner: notes.user_admin
  vendor: notes.vendor_local
  credential: notes.cred_local_templates
  config:
    local_root: "../.."
    local_name: angee-django
    credential_env: ANTHROPIC_API_KEY
