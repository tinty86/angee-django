_meta:
  model: iam.OAuthClient
rows:
  # A disabled demo OIDC connection. The client id is a placeholder — the real
  # authorize round-trip needs a deployment to configure and enable its own
  # credentials.
  - _xref: demo_google
    fields:
      slug: google
      icon: google
      display_name: Google (demo)
      client_id: demo-oidc-client
      is_oidc: true
      is_enabled: false
      discovery_url: https://accounts.google.com/.well-known/openid-configuration
      authorize_endpoint: https://accounts.google.com/o/oauth2/v2/auth
      token_endpoint: https://oauth2.googleapis.com/token
      default_scopes:
        - openid
        - email
      scopes_catalogue:
        - openid
        - email
        - profile
      allowed_email_domains:
        - example.com
