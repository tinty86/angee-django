_meta:
  model: iam.OAuthClient
rows:
  # A demo OIDC connection so the login page shows an OAuth sign-in button. The
  # client id is a placeholder — the real authorize round-trip needs a deployment
  # to configure its own credentials; this is enough to demonstrate and test the
  # "Continue with <provider>" flow up to the provider redirect.
  - _xref: demo_google
    fields:
      slug: google
      icon: google
      display_name: Google (demo)
      client_id: demo-oidc-client
      is_oidc: true
      is_enabled: true
      discovery_url: https://accounts.google.com/.well-known/openid-configuration
      authorize_endpoint: https://accounts.google.com/o/oauth2/v2/auth
      token_endpoint: https://oauth2.googleapis.com/token
      default_scopes:
        - openid
        - email
      scopes_catalogue:
        - openid
        - email
        - profile
      allowed_email_domains:
        - example.com
