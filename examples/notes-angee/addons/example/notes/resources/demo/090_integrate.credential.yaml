# Placeholder inference credential so the demo agent's provider chain is complete at seed
# time (Integration.credential is required). Its api_key is intentionally EMPTY: it carries
# no usable secret, so provisioning the demo agent (095) is refused with a clear message
# until real inference is connected — never rendering a bogus key into the service. Connect
# "Anthropic Personal Plans" (Providers page) and point the agent at that OAuth credential
# (its `inference_credential`); see 095.
- xref: cred_anthropic_demo
  user: notes.user_admin
  kind: static_token
  name: anthropic-inference-demo
  material: '{"api_key": ""}'
# Bearer the demo agent presents to the platform's internal MCP server (0945). The base
# `angee.mcp` verifier matches this credential's `secret_value()` to the inbound bearer and
# resolves the agent actor; the same value is synced to the operator store at provision time
# (`mcp_secrets()`), so the file header and the verified secret can't drift.
- xref: cred_mcp_angee
  user: notes.user_admin
  kind: static_token
  name: angee-mcp-bearer
  material: '{"api_key": "demo-mcp-bearer-token"}'
