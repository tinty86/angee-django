name: publish base image

# Builds and publishes ghcr.io/ang-ee/django-angee-base — the framework runtime
# base (python-slim + uv + the dependency closure). Tagged to the framework
# version on release; :edge tracks main. Derived images (a downstream project, a
# workspace dev stack) and the operator's docker-compose FROM this.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/publish-base-image.yml"
  workflow_dispatch:

concurrency:
  group: base-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/ang-ee/django-angee-base

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: final
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
