[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "django-angee"
version = "0.1.0"
description = "Thin Django composition primitives for Angee applications."
license = "AGPL-3.0-or-later"
license-files = ["LICENSE"]
requires-python = ">=3.14"
dependencies = [
  "channels>=4.0",
  "cryptography>=44",
  "daphne>=4.0",
  "django-import-export>=4.3",
  "django-reversion>=5.1",
  "django-simple-history>=3.7",
  "django-sqids>=0.1",
  "django-zed-rebac[strawberry-django]>=0.10.0",
  "django>=6.0",
  "pyyaml>=6",
  "strawberry-graphql>=0.270",
  "strawberry-django-aggregates>=0.4.1",
  "strawberry-graphql-django>=0.86",
  "tablib>=3",
  "django-choices-field>=4.0.0",
]

[dependency-groups]
dev = [
  "faker>=30.0",
  "mypy>=1.10",
  "pytest>=8.0",
  "pytest-django>=4.8",
  "ruff>=0.15.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/angee"]
artifacts = [
  "src/angee/**/*.csv",
  "src/angee/**/*.pyi",
  "src/angee/**/*.typed",
  "src/angee/**/*.yaml",
  "src/angee/**/*.yml",
  "src/angee/**/*.zed",
]

[tool.hatch.build.targets.sdist]
only-include = [
  "AGENTS.md",
  "LICENSE",
  "README.md",
  "docs",
  "examples",
  "pyproject.toml",
  "src",
  "tests",
  "uv.lock",
]

[tool.pytest.ini_options]
cache_dir = ".pytest_cache"
DJANGO_SETTINGS_MODULE = "tests.settings"
python_files = ["test_*.py"]
testpaths = ["tests", "src/angee/resources/tests"]
pythonpath = [".", "src", "examples/notes-angee/src"]
addopts = "-ra --strict-markers --import-mode=importlib"

[tool.ruff]
line-length = 120
target-version = "py314"
cache-dir = ".ruff_cache"
exclude = [
  ".angee",
  ".git",
  ".mypy_cache",
  ".reference",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "node_modules",
  # Generated runtime is emitted output, not source: concrete models and
  # Django-authored migrations live here. The composer owns its shape; lint
  # the abstract sources instead.
  "**/runtime",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.14"
cache_dir = ".mypy_cache"
explicit_package_bases = true
ignore_missing_imports = true
mypy_path = ["src"]
warn_unused_ignores = true
