# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.compose"
description = "The build-time composer that turns addon contracts into a runnable Django project"
keywords = ["composer", "build", "runtime"]
category = "Foundation"
depends_on = ["django_yamlconf"]
