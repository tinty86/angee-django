# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.base"
description = "Django app configuration for Angee's model foundation."
keywords = ["models", "toolkit", "orm"]
category = "Foundation"
depends_on = ["angee.compose", "django.contrib.contenttypes", "rebac", "reversion", "simple_history"]
