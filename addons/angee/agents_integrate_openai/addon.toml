# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.agents_integrate_openai"
description = "Source app manifest for OpenAI's inference backend."
keywords = ["openai", "gpt", "inference"]
category = "Integration"
depends_on = ["angee.agents", "angee.integrate"]

[resources]
demo = [
  { path = "resources/demo/010_integrate.credential.yaml", depends_on = "iam:resources/demo/010_iam.user.yaml", adopt = ["user", "name"] },
  { path = "resources/demo/030_agents.inferenceprovider.yaml", depends_on = ["resources/demo/010_integrate.credential.yaml", "integrate:resources/master/010_integrate.vendor.yaml"] },
  { path = "resources/demo/040_agents.inferencemodel.yaml", depends_on = "resources/demo/030_agents.inferenceprovider.yaml", adopt = ["provider", "name"] },
]
