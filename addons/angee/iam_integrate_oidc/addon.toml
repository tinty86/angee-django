# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.iam_integrate_oidc"
description = "Source app manifest for the OIDC login addon."
keywords = ["oidc", "login", "sso"]
category = "Integration"
depends_on = ["angee.iam", "angee.integrate"]

[resources]
install = [
  { path = "resources/install/010_integrate.oauthclient.yaml", adopt = ["slug", "environment"] },
]
demo = [
  { path = "resources/demo/010_integrate.oauthclient.yaml", adopt = ["slug", "environment"] },
]
