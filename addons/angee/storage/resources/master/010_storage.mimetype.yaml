# MIME taxonomy (master tier). Model inferred from the `storage.mimetype`
# filename. Adopted by mime_type so a pre-existing row is linked instead of
# duplicated; master rows re-sync from this file when it changes.
#
# `icon_key` names a lucide icon for the frontend icon registry. The
# `application/octet-stream` row is the catch-all finalize falls back to and
# must always exist.

