# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.iam"
description = "Identity, the swappable user model, and the REBAC permission hub"
keywords = ["identity", "rebac", "auth"]
category = "Foundation"
depends_on = ["angee.resources", "angee.graphql", "axes", "django.contrib.auth", "django.contrib.sessions"]

[resources]
demo = [
  { path = "resources/demo/010_iam.user.yaml", adopt = "username" },
]
