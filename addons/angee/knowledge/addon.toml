# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.knowledge"
description = "Source app manifest for the knowledge addon."
keywords = ["knowledge", "rag", "embeddings"]
category = "Data"
depends_on = ["angee.iam"]

[resources]
demo = [
  { path = "resources/demo/010_knowledge.vault.yaml", depends_on = "iam:resources/demo/010_iam.user.yaml", adopt = ["owner", "name"] },
  { path = "resources/demo/020_knowledge.page.yaml", depends_on = "resources/demo/010_knowledge.vault.yaml", adopt = ["vault", "title"] },
  { path = "resources/demo/030_knowledge.markdown_page.yaml", depends_on = "resources/demo/020_knowledge.page.yaml", adopt = "page" },
]
