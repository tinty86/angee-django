# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.integrate"
description = "The integration substrate — OAuth connections, credentials, and the bridge/capability runtime"
keywords = ["integrations", "oauth", "connections"]
category = "Integration"
depends_on = ["angee.iam", "angee.resources"]

[resources]
master = [
  { path = "resources/master/010_integrate.vendor.yaml", adopt = "slug" },
]
install = [
  { path = "resources/install/010_integrate.oauthclient.yaml", adopt = ["slug", "environment"] },
]
