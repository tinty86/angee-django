# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.messaging"
description = "Messaging addon: threads, messages, and the channel-bridge substrate."
keywords = ["messaging", "channels", "chat"]
category = "Data"
depends_on = ["angee.parties", "angee.integrate", "angee.storage"]
schemas = "schema.schemas"
permissions = "permissions.zed"

[web]
package = "@angee/messaging"
