# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.parties"
description = "Contacts — people and organizations, their circles, relationships, addresses, affiliations, and directory sync"
keywords = ["parties", "contacts", "crm"]
category = "Data"
depends_on = ["angee.iam", "angee.integrate", "angee.storage"]

[[migrations]]
name = "relationship_anchor"
app_label = "parties"
module = "runtime_migrations.relationship_anchor"

[resources]
master = [
  { path = "resources/master/010_parties.relationshipkind.yaml", adopt = "slug" },
]
