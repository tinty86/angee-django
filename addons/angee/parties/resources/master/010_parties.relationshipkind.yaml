# The relationship vocabulary (master tier), derived from XFN 1.1 / vCard 4.0
# RELATED values plus the health-gaps kinship set. Model inferred from the
# `parties.relationshipkind` filename. Adopted by slug so renamed labels re-sync
# onto the same row. `name` is the anchor-side label (what the counterparty is
# TO the party — "Mother"); a blank inverse_name means the kind is symmetric.
# Users add their own kinds alongside.
