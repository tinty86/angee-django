# Models in the provider catalogue. `config.provider_model` is the Anthropic API id;
# `name` is the selectable runtime handle. Claude Code renders the provider model id as
# ANTHROPIC_MODEL, while opencode expects the selected `provider/model` handle as
# OPENCODE_MODEL and its ACP model selection. The same Anthropic model therefore keeps
# sibling rows over the one provider, one per selectable runtime convention.
- xref: model_claude_demo
  provider: agents_integrate_anthropic.provider_anthropic_demo
  name: claude-sonnet-4-6
  display_name: Claude Sonnet 4.6
# The opencode-handle sibling: same Anthropic model, addressed the way opencode expects.
- xref: model_opencode_demo
  provider: agents_integrate_anthropic.provider_anthropic_demo
  name: anthropic/claude-sonnet-4-6
  display_name: Claude Sonnet 4.6 (OpenCode)
