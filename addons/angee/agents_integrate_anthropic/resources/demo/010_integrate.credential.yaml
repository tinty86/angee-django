# time (Integration.credential is required). Its api_key is intentionally empty:
# it carries no usable secret, so provisioning refuses until real inference is connected.
- xref: cred_anthropic_demo
  user: iam.user_admin
  kind: static_token
  name: anthropic-inference-demo
  material: '{"api_key": ""}'
