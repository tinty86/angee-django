# Bearer demo agents present to the platform's internal MCP server. The base
# `angee.mcp` verifier matches this credential's `secret_value()` to the inbound
# bearer and resolves the agent actor; provisioning syncs the same value to the
# operator store via `mcp_secrets()`.
- xref: cred_mcp_angee
  user: iam.user_admin
  kind: static_token
  name: angee-mcp-bearer
  material: '{"api_key": "demo-mcp-bearer-token"}'
