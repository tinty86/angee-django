# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.platform"
description = "Source app manifest for the platform console."
keywords = ["console", "admin", "explorer"]
category = "Platform"
depends_on = ["angee.iam", "angee.resources"]
schemas = "schema.schemas"
permissions = "permissions.zed"

[web]
package = "@angee/platform"
