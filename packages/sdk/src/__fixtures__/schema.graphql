# Pinned GraphQL contract for the SDK.
#
# A synthetic model (`Sale`) that exercises the conventions the document builder
# follows, so the framework SDK stays free of any consumer model. It mirrors the
# shapes strawberry-django emits, so a document valid here is valid against a real
# runtime endpoint:
#
#  - public node ids (`id: ID!`) and a `Node` interface;
#  - offset pagination (`totalCount`, `results`, `pageInfo { offset limit }`) read
#    with `pagination: { offset, limit }`, so the client owns "page N of M";
#  - a `@oneOf` order input over an `Ordering` enum, and lookup-object filters;
#  - verb-first `create/update/delete` mutations taking `data:` / a `Patch` (whose
#    id travels inside the patch) / an `id:`, with the cascade `DeletePreview`;
#  - one `<noun>Aggregate` field returning `{ count, sum, avg, min, max }` and
#    one `<noun>Groups(...)` field returning offset-paginated grouped rows;
#  - session login (`login`/`logout`/`current_user`);
#  - a per-model `<noun>Changed` change event.
#
# This file is the source the codegen and the document-builder tests both read.

directive @oneOf on INPUT_OBJECT

scalar DateTime

scalar JSON

scalar BigInt

"""An object with a public ID"""
interface Node {
  """The public ID of this object"""
  id: ID!
}

enum SaleState {
  DRAFT
  OPEN
  CLOSED
}

enum Ordering {
  ASC
  ASC_NULLS_FIRST
  ASC_NULLS_LAST
  DESC
  DESC_NULLS_FIRST
  DESC_NULLS_LAST
}

enum Granularity {
  YEAR
  QUARTER
  MONTH
  WEEK
  DAY
  HOUR
  MINUTE
  SECOND
  YEAR_NUMBER
  QUARTER_NUMBER
  MONTH_NUMBER
  ISO_WEEK_NUMBER
  DAY_OF_YEAR
  DAY_OF_MONTH
  DAY_OF_WEEK
  HOUR_NUMBER
  MINUTE_NUMBER
  SECOND_NUMBER
}

enum NullsPosition {
  FIRST
  LAST
}

enum OrderDirection {
  ASC
  DESC
}

type Sale implements Node {
  id: ID!
  title: String!
  state: SaleState!
  amount: Int!
  isFeatured: Boolean!
  tags: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SaleOffsetPaginated {
  pageInfo: OffsetPaginationInfo!
  totalCount: Int!
  results: [Sale!]!
}

type OffsetPaginationInfo {
  offset: Int!
  limit: Int
}

input OffsetPaginationInput {
  offset: Int! = 0
  limit: Int
}

input BoolBaseFilterLookup {
  exact: Boolean
  isNull: Boolean
  inList: [Boolean!]
}

input StrFilterLookup {
  exact: String
  isNull: Boolean
  inList: [String!]
  iExact: String
  contains: String
  iContains: String
  startsWith: String
  iStartsWith: String
  endsWith: String
  iEndsWith: String
  regex: String
  iRegex: String
}

input SaleStateFilterLookup {
  exact: SaleState
  isNull: Boolean
  inList: [SaleState!]
}

input SaleFilter {
  state: SaleStateFilterLookup
  isFeatured: BoolBaseFilterLookup
  title: StrFilterLookup
  AND: SaleFilter
  OR: SaleFilter
  NOT: SaleFilter
  DISTINCT: Boolean
}

input SaleOrder @oneOf {
  title: Ordering
  state: Ordering
  createdAt: Ordering
  updatedAt: Ordering
}

input SaleInput {
  title: String!
  state: SaleState! = DRAFT
  isFeatured: Boolean! = false
  tags: [String!]! = []
}

input SalePatch {
  id: ID!
  title: String
  state: SaleState
  isFeatured: Boolean
  tags: [String!]
}

enum SaleGroupableField {
  STATE
  IS_FEATURED
  CREATED_AT
}

input SaleGroupBySpec {
  field: SaleGroupableField!
  granularity: Granularity = null
}

input SaleGroupOrder {
  field: String!
  direction: OrderDirection! = ASC
  nulls: NullsPosition = null
}

type SaleGroupKey {
  state: SaleState
  isFeatured: Boolean
  createdAt: DateTime
  createdAtMonth: DateTime
}

type SaleGrouped {
  key: SaleGroupKey!
  count: Int!
  filter: JSON!
  sum: SaleSumFields
  avg: SaleAvgFields
  min: SaleMinFields
  max: SaleMaxFields
}

type SaleGroupedResult {
  pageInfo: OffsetPaginationInfo!
  totalCount: Int!
  results: [SaleGrouped!]!
}

type SaleAggregate {
  count: Int!
  sum: SaleSumFields
  avg: SaleAvgFields
  min: SaleMinFields
  max: SaleMaxFields
}

type SaleSumFields {
  amount: BigInt
}

type SaleAvgFields {
  amount: Float
}

type SaleMinFields {
  amount: Int
}

type SaleMaxFields {
  amount: Int
}

type DeletePreviewGroup {
  label: String!
  count: Int!
}

type DeletePreviewNode {
  label: String!
  objectLabel: String!
  objectId: String
  children: [DeletePreviewNode!]!
}

type DeletePreview {
  totalDeletedCount: Int!
  deleted: [DeletePreviewGroup!]!
  updated: [DeletePreviewGroup!]!
  blocked: [DeletePreviewGroup!]!
  hasBlockers: Boolean!
  root: DeletePreviewNode!
}

type Viewer implements Node {
  id: ID!
  username: String!
  first_name: String!
  last_name: String!
  email: String!
  is_staff: Boolean!
  is_active: Boolean!
  preferences: JSON!
}

type IAMRoleType {
  id: ID!
  namespace: String!
}

type LoginPayload {
  ok: Boolean!
  user: Viewer
}

type ChangeEvent {
  model: String!
  id: ID!
  action: String!
  changedFields: [String!]
  changedValues: JSON
}

type Query {
  current_user: Viewer
  sale(id: ID!): Sale
  sales(
    pagination: OffsetPaginationInput
    filters: SaleFilter
    order: SaleOrder
  ): SaleOffsetPaginated!
  saleAggregate(filter: SaleFilter): SaleAggregate!
  saleGroups(
    groupBy: [SaleGroupBySpec!]!
    pagination: OffsetPaginationInput
    filter: SaleFilter
    orderBy: [SaleGroupOrder!] = null
  ): SaleGroupedResult!
}

type Mutation {
  login(username: String!, password: String!): LoginPayload!
  logout: Boolean!
  update_preferences(preferences: JSON!): Viewer
  createSale(data: SaleInput!): Sale!
  updateSale(data: SalePatch!): Sale!
  deleteSale(id: ID!, confirm: Boolean! = false): DeletePreview!
}

type Subscription {
  saleChanged: ChangeEvent!
}
